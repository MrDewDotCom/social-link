<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dewdabid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            /* ── CORE PALETTE ── */
            --bg-top: #0A1120;
            --bg-bottom: #060816;
            --container-bg: rgba(15, 20, 35, 0.75);
            --blue: #4DA3FF;
            --blue-glow: rgba(77, 163, 255, 0.25);
            --text: #FFFFFF;
            --text-secondary: #A9B6CC;
            --border: rgba(77, 163, 255, 0.18);
            --border-bright: rgba(77, 163, 255, 0.5);
            --radius: 18px;

            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans Thai', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100vh;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, var(--bg-top), var(--bg-bottom) 65%);
            font-family: var(--font-body);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 64px 20px 60px;
            position: relative;
            overflow-x: hidden;
        }

        /* ── ANIMATED GRID BACKDROP ── */
        .grid-backdrop {
            position: fixed;
            inset: -10% -10% -10% -10%;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(77, 163, 255, 0.09) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77, 163, 255, 0.09) 1px, transparent 1px);
            background-size: 46px 46px;
            animation: gridDrift 90s linear infinite;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(0, 0, 0, 0.9), transparent 90%);
        }

        @keyframes gridDrift {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 640px 640px;
            }
        }

        /* ── AMBIENT CENTER GLOW ── */
        .ambient-glow {
            position: fixed;
            top: -10%;
            left: 50%;
            width: 900px;
            height: 900px;
            transform: translateX(-50%);
            background: radial-gradient(circle, var(--blue-glow), transparent 65%);
            filter: blur(10px);
            z-index: 0;
            pointer-events: none;
        }

        @font-face {
            font-family: "FCVision";
            src: url("./assets/fonts/FCVision-BoldCondensed.ttf") format("truetype");
            font-weight: 700;
            font-style: normal;
        }

        /* ── HERO TITLE (outside container) ── */
        .hero-title {
            position: relative;
            z-index: 2;
            font-family: "FCVision", sans-serif;
            font-weight: 700;
            font-size: clamp(2.6rem, 9vw, 4.6rem);
            letter-spacing: 1px;
            color: var(--text);
            text-shadow: 0 0 22px rgba(77, 163, 255, 0.35), 0 0 2px rgba(77, 163, 255, 0.4);
            margin-bottom: 6px;
            text-align: center;
            animation: heroFadeIn .7s ease both;

        }

        .hero-title .dud {
            color: var(--blue);
            opacity: .85;
        }

        .hero-title.is-settled {
            animation: glitchSettleOnce .5s ease-out, glitchFlicker 6s .5s infinite;
        }

        @keyframes glitchSettleOnce {
            0% {
                transform: translate(0, 0);
                text-shadow: -3px 0 rgba(255, 60, 90, 0.7), 3px 0 rgba(77, 220, 255, 0.7);
            }

            30% {
                transform: translate(2px, 0);
                text-shadow: 3px 0 rgba(255, 60, 90, 0.6), -3px 0 rgba(77, 220, 255, 0.6);
            }

            60% {
                transform: translate(-1px, 0);
                text-shadow: -2px 0 rgba(255, 60, 90, 0.4), 2px 0 rgba(77, 220, 255, 0.4);
            }

            100% {
                transform: translate(0, 0);
                text-shadow: 0 0 22px rgba(77, 163, 255, 0.35), 0 0 2px rgba(77, 163, 255, 0.4);
            }
        }

        @keyframes heroFadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glitchFlicker {

            0%,
            96%,
            100% {
                transform: translate(0, 0);
                text-shadow: 0 0 22px rgba(77, 163, 255, 0.35), 0 0 2px rgba(77, 163, 255, 0.4);
            }

            96.6% {
                transform: translate(-1.5px, 0);
                text-shadow: -2px 0 rgba(255, 60, 90, 0.55), 2px 0 rgba(77, 220, 255, 0.55);
            }

            97.1% {
                transform: translate(1.5px, 0);
                text-shadow: 2px 0 rgba(255, 60, 90, 0.5), -2px 0 rgba(77, 220, 255, 0.5);
            }

            97.6% {
                transform: translate(0, 0);
                text-shadow: 0 0 22px rgba(77, 163, 255, 0.35), 0 0 2px rgba(77, 163, 255, 0.4);
            }
        }

        .hero-tagline {
            position: relative;
            z-index: 2;
            font-family: var(--font-mono);
            font-size: .78rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 40px;
            text-align: center;
            animation: heroFadeIn .7s .1s ease both;
        }

        .hero-tagline::before {
            content: '> ';
            color: var(--blue);
        }

        /* ── MAIN CONTAINER ── */
        .card-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 460px;
        }

        .card {
            width: 100%;
            min-height: 640px;
            background: var(--container-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 0 0 1px rgba(77, 163, 255, 0.04), 0 30px 70px rgba(0, 0, 0, 0.45), 0 0 60px -10px var(--blue-glow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px 26px;
            transform: scaleY(0.02) scaleX(0.02);
            transform-origin: center center;
            animation: cardEntrance .9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .card-icon svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }


        @keyframes cardEntrance {
            0% {
                transform: scaleY(0.02) scaleX(0.02);
                opacity: 0.4;
            }

            55% {
                transform: scaleY(1) scaleX(0.02);
                opacity: 1;
            }

            100% {
                transform: scaleY(1) scaleX(1);
                opacity: 1;
            }
        }

        /* elements inside the card reveal only after it has expanded */
        .reveal {
            opacity: 0;
            clip-path: inset(0 100% 0 0);
            animation: revealIn .55s ease forwards;
            animation-delay: calc(0.85s + var(--i, 0) * 0.08s);
        }

        @keyframes revealIn {
            from {
                opacity: 0;
                clip-path: inset(0 100% 0 0);
                transform: translateX(-6px);
            }

            to {
                opacity: 1;
                clip-path: inset(0 0 0 0);
                transform: translateX(0);
            }
        }

        /* ── AVATAR ── */
        .avatar-ring {
            --i: 0;
            width: 96px;
            height: 96px;
            border-radius: 50%;
            padding: 3px;
            background: conic-gradient(from 0deg, var(--blue), transparent 60%, var(--blue));
            margin-bottom: 18px;
            box-shadow: 0 0 24px var(--blue-glow);
        }

        .avatar-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            background: var(--bg-bottom);
        }

        .profile-name {
            --i: 1;
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .status-pill {
            --i: 2;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: .68rem;
            letter-spacing: 1px;
            color: var(--blue);
            background: rgba(77, 163, 255, 0.08);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 30px;
            margin-bottom: 14px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #58e08a;
            box-shadow: 0 0 6px #58e08a;
            animation: dotPulse 2.4s ease-in-out infinite;
        }

        @keyframes dotPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .4;
            }
        }

        .bio {
            --i: 3;
            font-size: .84rem;
            color: var(--text-secondary);
            text-align: center;
            max-width: 280px;
            line-height: 1.6;
            margin-bottom: 26px;
        }

        /* ── SCROLLABLE LINKS ZONE ── */
        .links-scroll {
            --i: 4;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            overflow-x: visible;
            padding: 4px 4px 4px 2px;
            margin: -4px -4px -4px -2px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-bright) transparent;
        }

        .links-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .links-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .links-scroll::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 4px;
        }

        /* ── LINK CARD ── */
        .link-card {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease, background .22s ease;
        }

        .link-card:hover {
            transform: translateY(-3px);
            background: rgba(77, 163, 255, 0.06);
            border-color: var(--border-bright);
            box-shadow: 0 10px 30px -8px var(--blue-glow), 0 0 0 1px var(--border-bright);
        }

        .link-card:hover .card-title {
            color: var(--blue);
        }

        .link-card:hover .card-icon {
            background: rgba(77, 163, 255, 0.16);
            border-color: var(--border-bright);
        }

        .link-card:active {
            transform: scale(0.98);
        }

        .card-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            border-radius: 10px;
            background: rgba(77, 163, 255, 0.08);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            transition: background .2s, border-color .2s;
        }

        .card-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--blue);
        }

        .card-text {
            flex: 1;
            min-width: 0;
            text-align: left;
        }

        .card-title {
            font-family: var(--font-mono);
            font-size: .82rem;
            font-weight: 500;
            color: var(--text);
            letter-spacing: .4px;
            line-height: 1.3;
            transition: color .2s;
        }

        .card-sub {
            font-size: .74rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .card-more {
            font-size: 16px;
            color: var(--text-secondary);
            padding: 0 2px;
        }

        /* ── SOCIAL ROW ── */
        .socials {
            --i: 5;
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s, transform .2s, border-color .2s, box-shadow .2s;
        }

        .social-btn:hover {
            background: rgba(77, 163, 255, 0.1);
            border-color: var(--border-bright);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px var(--blue-glow);
        }

        .social-btn svg {
            width: 17px;
            height: 17px;
            fill: var(--text-secondary);
            transition: fill .2s;
        }

        .social-btn:hover svg {
            fill: var(--blue);
        }

        /* ── FOOTER ── */
        .footer {
            --i: 6;
            font-family: var(--font-mono);
            font-size: .66rem;
            letter-spacing: .5px;
            color: rgba(169, 182, 204, 0.5);
            text-align: center;
            margin-top: auto;
            padding-top: 22px;
        }

        .footer a {
            color: rgba(169, 182, 204, 0.7);
            text-decoration: none;
        }

        .footer a:hover {
            color: var(--blue);
        }

        @media (max-width: 420px) {
            .card {
                padding: 34px 18px 22px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

    <script>
        // ── HERO TITLE DECODE / SCRAMBLE EFFECT ──
        // Timed to finish right as the card + its content reveal finishes:
        // card entrance (900ms) + reveal start delay (850ms) + last item stagger (footer, i=6 → 480ms) + reveal duration (550ms) ≈ 1880ms
        const CONTENT_REVEAL_END_MS = 1880;

        class TextScramble {
            constructor(el, totalDuration) {
                this.el = el;
                this.totalDuration = totalDuration;
                this.chars = '!<>-_\\/[]{}—=+*^?#$%01ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                this.update = this.update.bind(this);
            }
            setText(newText) {
                const oldText = this.el.textContent;
                const length = Math.max(oldText.length, newText.length);
                const promise = new Promise((resolve) => (this.resolve = resolve));
                this.queue = [];
                for (let i = 0; i < length; i++) {
                    const from = oldText[i] || '';
                    const to = newText[i] || '';
                    // characters lock left-to-right, converging near totalDuration
                    const progress = length > 1 ? i / (length - 1) : 1;
                    const lockAt = progress * this.totalDuration * 0.9 + Math.random() * this.totalDuration * 0.1;
                    const scrambleFor = 350 + Math.random() * 500;
                    const startAt = Math.max(0, lockAt - scrambleFor);
                    this.queue.push({ from, to, start: startAt, end: lockAt, char: '' });
                }
                this.startTime = null;
                cancelAnimationFrame(this.frameRequest);
                this.frameRequest = requestAnimationFrame(this.update);
                return promise;
            }
            update(now) {
                if (this.startTime === null) this.startTime = now;
                const elapsed = now - this.startTime;
                let output = '';
                let complete = 0;
                for (let i = 0, n = this.queue.length; i < n; i++) {
                    let { from, to, start, end, char } = this.queue[i];
                    if (elapsed >= end) {
                        complete++;
                        output += to;
                    } else if (elapsed >= start) {
                        if (!char || Math.random() < 0.32) {
                            char = this.randomChar();
                            this.queue[i].char = char;
                        }
                        output += `<span class="dud">${char}</span>`;
                    } else {
                        output += from;
                    }
                }
                this.el.innerHTML = output;
                if (complete === this.queue.length) {
                    this.resolve();
                } else {
                    this.frameRequest = requestAnimationFrame(this.update);
                }
            }
            randomChar() {
                return this.chars[Math.floor(Math.random() * this.chars.length)];
            }
        }

        const heroEl = document.getElementById('hero-title');
        const fx = new TextScramble(heroEl, CONTENT_REVEAL_END_MS);
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (prefersReducedMotion) {
            heroEl.textContent = 'DEWDABID';
            heroEl.classList.add('is-settled');
        } else {
            fx.setText('DEWDABID').then(() => {
                heroEl.classList.add('is-settled');
            });
        }
    </script>
